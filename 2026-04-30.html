<!DOCTYPE html>

<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #map { height: 100vh; width: 100vw; }
  .header {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);

    box-shadow: 0 2px 6px rgba(0,0,0,0.15); z-index: 1000; font-size: 15px; font-weight: 600;
  }
  .leaflet-popup-content { font-size: 14px; line-height: 1.5; max-height: 350px; overflow-y: auto; }
  .leaflet-popup-content h3 { margin: 0 0 10px; font-size: 16px; font-weight: 700; }
  .leaflet-popup-content .gig { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
  .leaflet-popup-content .gig:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .leaflet-popup-content .gig-title { font-weight: bold; font-size: 14px; }
  .leaflet-popup-content .gig-meta { color: #555; font-size: 12px; margin: 2px 0; }
  .leaflet-popup-content .lineup { font-size: 12px; margin: 2px 0; }
  .leaflet-popup-content .view-event { font-size: 11px; margin: 2px 0; }
  .leaflet-popup-content a { color: #1a73e8; text-decoration: underline; font-weight: 500; }
  .leaflet-popup-content a:hover { text-decoration: none; background: #e8f0fe; }
</style>
</head>
<body>
<div class="header">Deep North — Thursday 30 Apr 2026</div>
<div id="map"></div>
<script>
  const map = L.map('map').setView([-37.775, 144.985], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {

    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);

  const venues = [{"name": "Shotkickers", "lat": -37.7559265, "lng": 145.0013923, "popupHtml": "<h3>Shotkickers</h3><div class=\"gig\"><div class=\"gig-title\">Badlanders</div><div class=\"lineup\"><a href=\"https://open.spotify.com/artist/0W8P4g3jnnJ4SuXCPkSmJP\" target=\"_blank\">Badlanders</a> | The Flickering Stars</div><div class=\"view-event\"><a href=\"https://tickets.oztix.com.au/outlet/event/7d9e0b19-cf55-403e-b534-a07e1bde4aaf\" target=\"_blank\">View event &#8594;</a></div></div>"}, {"name": "Cactus Room Thornbury", "lat": -37.7612582, "lng": 145.0004166, "popupHtml": "<h3>Cactus Room Thornbury</h3><div class=\"gig\"><div class=\"gig-title\">the greatest music bill ever assembled</div><div class=\"gig-meta\">19:00 &middot; $20.00</div><div class=\"lineup\">Macropcarpa</div><div class=\"view-event\"><a href=\"https://events.humanitix.com/tgmbea/tickets\" target=\"_blank\">View event &#8594;</a></div></div>"}, {"name": "The Retreat Hotel", "lat": -37.773, "lng": 144.961, "popupHtml": "<h3>The Retreat Hotel</h3><div class=\"gig\"><div class=\"gig-title\">ANGLERR &#x27;Sea Shells&#x27; Single Launch w/ Waxman &amp; Crash_08</div><div class=\"gig-meta\">19:00</div><div class=\"lineup\"><a href=\"https://open.spotify.com/artist/0aOBjPFYQJIjVZ6BFkB1Xe\" target=\"_blank\">ANGLERR</a> | <a href=\"https://open.spotify.com/artist/0UYrDICfLP1lccvCZMEFwt\" target=\"_blank\">Crash_08</a> | <a href=\"https://open.spotify.com/artist/04ekquPFZIvL2WghugNKG3\" target=\"_blank\">Waxman</a></div><div class=\"view-event\"><a href=\"https://www.eventbrite.com.au/e/1984855591505\" target=\"_blank\">View event &#8594;</a></div></div>"}, {"name": "The Workers Club", "lat": -37.8055776, "lng": 144.9769451, "popupHtml": "<h3>The Workers Club</h3><div class=\"gig\"><div class=\"gig-title\">DEDFATE</div><div class=\"gig-meta\">19:00 &middot; $17.85</div><div class=\"lineup\"><a href=\"https://open.spotify.com/artist/4feXWuhjgsF56SK7qZUHIE\" target=\"_blank\">DEDFATE</a> | <a href=\"https://open.spotify.com/artist/4Ntcp9EpnYo5KyfUvv5cMD\" target=\"_blank\">Border of Reason</a> | HATRIARCH</div><div class=\"view-event\"><a href=\"https://theworkersclub.oztix.com.au/outlet/event/b72168be-49bc-45c7-ab09-44c7062c48db?utm_source=TheWorkersClub&utm_medium=Website\" target=\"_blank\">View event &#8594;</a></div></div>"}];

  venues.forEach(v => {
    const marker = L.marker([v.lat, v.lng]).addTo(map);
    marker.bindPopup(v.popupHtml);
  });

  
  const playlistLink = document.createElement('a');
  playlistLink.href = 'https://open.spotify.com/playlist/1E3LRpyCQm6w1BWVavxk0t';
  playlistLink.target = '_blank';
  playlistLink.textContent = 'Open Spotify Playlist';
  playlistLink.style.cssText = 'position:absolute;top:10px;right:10px;background:rgba(30,215,96,0.95);color:#000;padding:8px 14px;border-radius:20px;font-weight:600;font-size:13px;text-decoration:none;z-index:1000;box-shadow:0 2px 6px rgba(0,0,0,0.15);';
  document.body.appendChild(playlistLink);

</script>
</body>
</html>
