<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep North — Thursday 7 May 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  #map { height: 100vh; width: 100vw; }

  .leaflet-tile-pane { filter: invert(1) hue-rotate(9deg); }

  .header {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    background: #D9D8CF; border: 1px solid #867A65; color: #867A65;
    padding: 8px 20px; z-index: 1000; white-space: nowrap;
    display: flex; align-items: center; gap: 16px;
  }
  .header-brand { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .header-sep { opacity: 0.4; }
  .header-date { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; }

  .playlist-btn {
    position: absolute; top: 20px; right: 20px;
    background: #D9D8CF; border: 1px solid #867A65; color: #867A65;
    padding: 8px 16px; font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase;
    text-decoration: none; z-index: 1000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  .leaflet-popup-content-wrapper {
    background: #D9D8CF !important; border: 1px solid #867A65 !important;
    border-radius: 0 !important; box-shadow: none !important; padding: 0 !important;
  }
  .leaflet-popup-tip { background: #D9D8CF !important; box-shadow: none !important; }
  .leaflet-popup-tip-container { margin-top: -1px; }
  .leaflet-popup-content { margin: 0 !important; color: #867A65; font-family: inherit; }
  .leaflet-popup-close-button { color: #867A65 !important; font-size: 16px !important; top: 8px !important; right: 8px !important; }

  .popup-inner { padding: 16px 20px 14px; min-width: 220px; max-width: 280px; }
  .popup-venue { font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; margin-bottom: 14px; border-bottom: 1px solid rgba(134,122,101,0.3); padding-bottom: 10px; }
  .popup-venue a { color: #867A65; text-decoration: none; }
  .popup-venue a:hover { text-decoration: underline; }
  .popup-gig { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid rgba(134,122,101,0.15); }
  .popup-gig:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .popup-title { font-size: 13px; margin-bottom: 4px; }
  .popup-meta { font-size: 11px; opacity: 0.65; margin-bottom: 4px; }
  .popup-lineup { font-size: 11px; margin-bottom: 6px; line-height: 1.4; }
  .popup-link { font-size: 10px; letter-spacing: 0.05em; }
  .popup-link a { color: #867A65; text-decoration: underline; }

  .dn-marker {
    width: 10px; height: 10px; background: #867A65;
    border: 2px solid #D9D8CF; border-radius: 50%; box-shadow: 0 0 0 1px #867A65;
  }
</style>
</head>
<body>
<div class="header">
  <span class="header-brand">Deep North</span>
  <span class="header-sep">—</span>
  <span class="header-date">Thursday 7 May 2026</span>
</div>
<div id="map"></div>
<script>
  const map = L.map('map', { zoomControl: false }).setView([-37.775, 144.985], 13);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);

  const dnIcon = L.divIcon({
    className: '',
    html: '<div class="dn-marker"></div>',
    iconSize: [10, 10],
    iconAnchor: [5, 5],
    popupAnchor: [0, -10]
  });

 "The Tote", "lat": -37.7995023, "lng": 144.9871252, "popupHtml": "<div class=\"popup-inner\"><div class=\"popup-venue\">The Tote</div><div class=\"popup-gig\"><div class=\"popup-title\">The Mods - Single launch of \u2018Little White Bird\u2019</div><div class=\"popup-meta\">19:30 &middot; $16.35</div><div class=\"popup-lineup\"><a href=\"https://open.spotify.com/artist/0NBnkNzyNBC2UT58bAFX1o\" target=\"_blank\">The Mods</a> | <a href=\"https://open.spotify.com/artist/1vGoYTW2SShffTAmzIjghK\" target=\"_blank\">Girls Night In</a> | <a href=\"https://open.spotify.com/artist/50lh0vyXhOCLCMbfKvGc7x\" target=\"_blank\">Zero City</a></div><div class=\"popup-link\"><a href=\"https://thetotehotel.oztix.com.au/outlet/event/d8244159-2e52-4d30-b580-9b2b855adfc4?utm_source=TheToteHotel&utm_medium=Website\" target=\"_blank\">View event &#8594;</a></div></div></div>"}, {"name": "The Retreat Hotel", "lat": -37.773, "lng": 144.961, "popupHtml": "<div class=\"popup-inner\"><div class=\"popup-venue\">The Retreat Hotel</div><div class=\"popup-gig\"><div class=\"popup-title\">Salsodromo: Live band + Social Dancing</div><div class=\"popup-meta\">20:30</div><div class=\"popup-lineup\"><a href=\"https://open.spotify.com/artist/2egX2b6256XrO4WEaKXVcB\" target=\"_blank\">Salsodromo</a></div><div class=\"popup-link\"><a href=\"https://www.eventbrite.com.au/e/1986378013109\" target=\"_blank\">View event &#8594;</a></div></div></div>"}];

  venues.forEach(v => {
    L.marker([v.lat, v.lng], { icon: dnIcon }).addTo(map).bindPopup(v.popupHtml);
  });

  
  const playlistLink = document.createElement('a');
  playlistLink.href = 'https://open.spotify.com/playlist/5YaGnpjjmw0zdDPuKk75kg';
  playlistLink.target = '_blank';
  playlistLink.textContent = 'Open Playlist ↗';
  playlistLink.className = 'playlist-btn';
  document.body.appendChild(playlistLink);

</script>
</body>
</html>
