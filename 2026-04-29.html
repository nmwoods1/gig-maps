theworkersclub.oztiz.com.au/outlet/event/f2b35ff6-73ce-44a8-a79e-90bdb35b5136?utm_source=TheWorkersClub&utm_medium=Website\" target=\"_blank\">View event &#8594;</a></div></div>"}];
